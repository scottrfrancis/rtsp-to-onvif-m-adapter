name: release

# Publishes to PyPI on a version tag (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token needed, but you must first
# register this repo + the `pypi` environment as a trusted publisher for the
# `onvif-m-producer` project on PyPI.
# One-time setup + how to cut a release: docs/releasing.md
# Background: https://docs.pypi.org/trusted-publishers/
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
